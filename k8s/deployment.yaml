apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-static-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-static
  template:
    metadata:
      labels:
        app: cloud-static
    spec:
      containers:
      - name: flask-app
        # REMPLACE <ton-nom-github> par ton vrai pseudo GitHub
        image: ghcr.io/sedrash/cloud-app:latest
        ports:
        - containerPort: 5000
        # Ajout des sondes demandées par le projet 
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
